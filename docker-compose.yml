name: vertigis-starter-kit

services:
  editor:
    image: ghcr.io/gpickell/starter-kit/config-editor:latest
    ports:
      - 127.0.0.1:8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - home:/root
      - config:/config
    restart: unless-stopped

volumes:
  config: {}
  home: {}
